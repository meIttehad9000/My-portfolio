<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; padding: 40px 24px; align-items: center; }
    .admin-container { width: 100%; max-width: 800px; background: var(--card); border: 1px solid rgba(212,175,55,0.2); border-radius: var(--radius); padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    
    /* Login State */
    #loginSection { text-align: center; }
    #loginSection input { width: 100%; max-width: 320px; padding: 12px 16px; border-radius: 8px; border: 1px solid rgba(212,175,55,0.3); background: rgba(0,0,0,0.3); color: #fff; margin-bottom: 20px; outline: none; transition: 0.3s; }
    #loginSection input:focus { border-color: var(--accent2); box-shadow: 0 0 10px var(--glow1); }
    #loginError { color: #ff4444; margin-top: 10px; font-size: 0.85rem; display: none; }
    
    /* Dashboard State */
    #dashboardSection { display: none; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.85rem; font-weight: 600; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(212,175,55,0.3); background: rgba(0,0,0,0.3); color: #fff; outline:none; transition: 0.3s; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent2); box-shadow: 0 0 10px var(--glow1); }
    
    .project-list { margin-top: 40px; }
    .project-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; margin-bottom: 12px; background: rgba(255,255,255,0.02); }
    .project-item.actions { display: flex; gap: 10px; }
    .btn-danger { background: rgba(255,50,50,0.1); color: #ff5555; border: 1px solid rgba(255,50,50,0.3); padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
    .btn-danger:hover { background: #ff5555; color: #111; }
  </style>
</head>
<body>

  <div class="admin-container" id="loginSection">
    <h2 style="margin-bottom:8px; color:var(--accent2);">Admin Secure Login</h2>
    <p style="color:var(--muted); font-size:0.9rem; margin-bottom:30px;">Access restricted. Backend authentication required.</p>
    <div>
      <input type="password" id="adminPassword" placeholder="Enter Password" autocomplete="current-password" onkeypress="if(event.key === 'Enter') login()">
    </div>
    <button class="btn-primary" onclick="login()"><span>Authenticate Securely</span></button>
    <div id="loginError">Incorrect password or server error.</div>
  </div>

  <div class="admin-container" id="dashboardSection">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
      <h2 style="color:var(--accent2);">Manage Projects</h2>
      <button class="btn-outline" onclick="logout()" style="padding: 8px 16px; font-size:0.8rem;">Logout</button>
    </div>

    <div style="background:rgba(212,175,55,0.05); padding:24px; border-radius:12px; border:1px solid rgba(212,175,55,0.2);">
      <h3 style="margin-bottom:20px;">Add New Portfolio Project</h3>
      <div class="form-group">
        <label>Project Title</label>
        <input type="text" id="pTitle" placeholder="e.g. FataFati Streetwear">
      </div>
      <div class="form-group">
        <label>Description (Markdown/Text)</label>
        <textarea id="pDesc" rows="4" placeholder="Features, highlights..."></textarea>
      </div>
      <div class="form-group" style="display:flex; gap:20px;">
        <div style="flex:1;">
          <label>Category Tag</label>
          <select id="pTag">
            <option value="E-COMMERCE">E-COMMERCE</option>
            <option value="BUSINESS">BUSINESS</option>
            <option value="GROCERY">GROCERY</option>
            <option value="OTHER">OTHER</option>
          </select>
        </div>
        <div style="flex:2;">
          <label>Image URL</label>
          <input type="text" id="pImg" placeholder="https://unsplash.com/...">
        </div>
      </div>
      <div class="form-group">
        <label>Live URL</label>
        <input type="text" id="pUrl" placeholder="https://...">
      </div>
      <button class="btn-primary" onclick="addProject()"><span>Save Project Securely</span></button>
    </div>

    <div class="project-list" id="adminProjectsList">
      <!-- Injected by JS -->
    </div>
    
    <div style="margin-top: 30px; font-size:0.8rem; color:var(--muted); text-align:center;">
      <p>Data is stored securely via browser localStorage for this administrative session.</p>
      <a href="/" style="color:var(--accent2); text-decoration:none; margin-top:10px; display:inline-block;">&larr; Back to Main Site</a>
    </div>

  </div>

  <script src="js/admin.js"></script>
</body>
</html>
